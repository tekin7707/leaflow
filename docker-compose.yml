services:
  postgres:
    image: postgres:16-alpine
    container_name: provit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: provit
      POSTGRES_PASSWORD: provit
      POSTGRES_DB: provit
    ports:
      - "7050:5432"
    volumes:
      - provit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provit -d provit"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Bir kez çalışır: pnpm install + prisma db push.
  # api ve web bunun başarıyla bitmesini bekler.
  # Seed manuel: `docker compose run --rm api pnpm --filter api seed`
  deps:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: provit-deps
    working_dir: /app
    command: >
      sh -c "pnpm install && pnpm --filter api db:push"
    environment:
      DATABASE_URL: postgresql://provit:provit@postgres:5432/provit
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - mobile_node_modules:/app/apps/mobile/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: provit-api
    working_dir: /app
    command: pnpm --filter api dev
    environment:
      DATABASE_URL: postgresql://provit:provit@postgres:5432/provit
      JWT_SECRET: dev-secret-change-me
      PORT: "4000"
      WEB_ORIGIN: http://localhost:7052
      PUBLIC_API_URL: http://localhost:7051
      LOG_LEVEL: info
      UPLOAD_DIR: ./uploads
      AUTH_MODE: ${AUTH_MODE:-mock}
      AGENTECHAUTH_BASE_URL: ${AGENTECHAUTH_BASE_URL:-https://api.agentechauth.com/api}
      AGENTECHAUTH_API_KEY: ${AGENTECHAUTH_API_KEY:-}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "7051:4000"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - api_uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      deps:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: provit-web
    working_dir: /app
    command: pnpm --filter web dev
    environment:
      VITE_API_URL: http://localhost:7051
      VITE_HMR_CLIENT_PORT: "7052"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "7052:5173"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully

volumes:
  provit_pg_data:
  root_node_modules:
  api_node_modules:
  web_node_modules:
  mobile_node_modules:
  shared_node_modules:
  api_uploads:
